name: Build WinSparkle

on: [push, pull_request]

jobs:
  build:
    name: Build DLL
    # Use the Windows 2022 image because Visual Studio 2022 is required.
    runs-on: windows-2022
    strategy:
      matrix:
        platform: [Win32, x64, ARM64]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3
      with:
        # Use VS2022 because newer MSVC runtimes no longer support Windows 7/8/8.1.
        vs-version: '[17.0,18.0)'

    - name: Restore dependency packages
      run: nuget restore

    - name: Build binaries
      run: msbuild -m -t:Build -p:Configuration=Release -p:Platform=${{ matrix.platform }} WinSparkle.sln

    - name: Run tests
      if: matrix.platform != 'ARM64'
      run: .\${{ matrix.platform }}\Release\winsparkle-tests.exe

    - name: Archive ARM64 test binaries
      if: matrix.platform == 'ARM64'
      uses: actions/upload-artifact@v7
      with:
        name: winsparkle-tests-ARM64
        path: |
          ARM64/Release/winsparkle-tests.exe
          ARM64/Release/winsparkle-tests.pdb
          ARM64/Release/WinSparkle.dll
          ARM64/Release/WinSparkle.pdb

    - name: Archive binaries
      uses: actions/upload-artifact@v7
      with:
        name: winsparkle-binaries-${{ matrix.platform }}
        path: |
          include/winsparkle*.h
          **/WinSparkle.dll
          **/WinSparkle.lib
          **/WinSparkle.pdb
          **/example*.exe
          **/winsparkle-tool.exe

  test-arm64:
    name: Test ARM64
    runs-on: windows-11-arm
    needs: build
    steps:
      - name: Fetch test binaries
        uses: actions/download-artifact@v8
        with:
          name: winsparkle-tests-ARM64
          path: ARM64/Release

      - name: Run tests
        run: .\ARM64\Release\winsparkle-tests.exe

  build-nuget:
    name: Build NuGet package
    runs-on: windows-2022
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch binaries (Win32)
        uses: actions/download-artifact@v8
        with:
          name: winsparkle-binaries-Win32

      - name: Fetch binaries (x64)
        uses: actions/download-artifact@v8
        with:
          name: winsparkle-binaries-x64

      - name: Fetch binaries (ARM64)
        uses: actions/download-artifact@v8
        with:
          name: winsparkle-binaries-ARM64

      - name: Build NuGet package
        run: nuget pack nuget/WinSparkle.nuspec -Verbosity detailed

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: "*.nupkg"

  publish-nuget:
    name: Publish NuGet
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-2022
    needs: [build-nuget, test-arm64]
    steps:
      - name: Fetch artifact
        uses: actions/download-artifact@v8
        with:
          name: nuget-package

      - uses: nuget/setup-nuget@v4
        with:
          nuget-api-key: ${{ secrets.NUGET_API_KEY }}
          nuget-api-key-source: https://www.nuget.org/api/v2/package

      - name: Publish to NuGet
        run: nuget push *.nupkg -Source https://www.nuget.org/api/v2/package

  publish-release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-nuget, test-arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Fetch binaries (Win32)
        uses: actions/download-artifact@v8
        with:
          name: winsparkle-binaries-Win32

      - name: Fetch binaries (x64)
        uses: actions/download-artifact@v8
        with:
          name: winsparkle-binaries-x64

      - name: Fetch binaries (ARM64)
        uses: actions/download-artifact@v8
        with:
          name: winsparkle-binaries-ARM64

      - name: Package tarballs
        run: make -f distrib.makefile

      - uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          prerelease: true
          artifacts: "WinSparkle*.zip"
          token: ${{ secrets.GITHUB_TOKEN }}
